<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trail Replay</title>
  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet"/>
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080D08;
      color: #E0D8C8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh; overflow: hidden;
    }

    .screen { display: none; width: 100vw; height: 100vh; }
    .screen.active { display: flex; }

    /* ── Connect ── */
    #s-connect {
      flex-direction: column; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 50% 60%, #0F1F0F 0%, #080D08 70%);
    }
    .connect-icon { font-size: 52px; margin-bottom: 18px; }
    .connect-title { font-size: 34px; font-weight: 300; color: #E0D8C8; margin-bottom: 8px; letter-spacing: -0.5px; }
    .connect-sub { font-size: 15px; color: #4A5A42; margin-bottom: 52px; }
    .connect-btn {
      display: flex; align-items: center; gap: 10px;
      background: #FC4C02; color: #fff; font-size: 16px; font-weight: 600;
      padding: 16px 36px; border-radius: 50px; border: none; cursor: pointer;
      box-shadow: 0 0 40px rgba(252,76,2,0.25);
      transition: opacity 0.2s, transform 0.1s;
    }
    .connect-btn:hover  { opacity: 0.88; }
    .connect-btn:active { transform: scale(0.97); }

    /* ── Activity ── */
    #s-activity {
      flex-direction: column; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 50% 60%, #0F1F0F 0%, #080D08 70%);
      gap: 0;
    }
    .welcome-line   { font-size: 14px; color: #4A5A42; margin-bottom: 6px; letter-spacing: 1px; text-transform: uppercase; }
    .welcome-name   { font-size: 36px; font-weight: 300; color: #E0D8C8; margin-bottom: 44px; }
    .url-input {
      width: 100%; max-width: 460px;
      padding: 16px 20px; background: #0E160C;
      border: 1.5px solid #1E2E1A; color: #E0D8C8;
      font-size: 15px; border-radius: 14px; outline: none;
      transition: border-color 0.2s;
    }
    .url-input::placeholder { color: #2E3E28; }
    .url-input:focus { border-color: #FC4C02; }
    .load-btn {
      width: 100%; max-width: 460px; margin-top: 12px;
      background: #FC4C02; color: #fff; font-size: 15px; font-weight: 600;
      padding: 15px; border-radius: 14px; border: none; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .load-btn:hover  { opacity: 0.88; }
    .load-btn:active { transform: scale(0.98); }
    .disconnect-btn {
      margin-top: 28px; background: none; border: none;
      color: #2E3E28; font-size: 13px; cursor: pointer; transition: color 0.2s;
    }
    .disconnect-btn:hover { color: #6A7A60; }

    /* ── Loading ── */
    #s-loading {
      flex-direction: column; align-items: center; justify-content: center;
      background: #080D08; gap: 20px;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid #1A2A18; border-top-color: #FC4C02;
      border-radius: 50%; animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-msg { font-size: 15px; color: #4A5A42; }

    /* ── Map ── */
    #s-map { position: relative; }
    #map { width: 100%; height: 100%; }

    .overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; }
    .overlay > * { pointer-events: auto; }

    /* Stats card */
    .stats-card {
      position: absolute; top: 20px; left: 20px;
      background: rgba(8,13,8,0.85); backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.06); border-radius: 16px;
      padding: 16px 20px; min-width: 210px;
    }
    .activity-name {
      font-size: 14px; font-weight: 600; color: #E0D8C8;
      margin-bottom: 12px; max-width: 230px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .stats-row { display: flex; gap: 20px; }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-val { font-size: 18px; font-weight: 700; color: #FC4C02; }
    .stat-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #3A4A32; }

    /* Back */
    .back-btn {
      position: absolute; top: 20px; right: 20px;
      background: rgba(8,13,8,0.85); backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.06); border-radius: 20px;
      color: #4A5A42; font-size: 13px; padding: 8px 18px; cursor: pointer;
      transition: color 0.2s;
    }
    .back-btn:hover { color: #E0D8C8; }

    /* Photo panel */
    .photo-panel {
      position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
      width: 260px;
      background: rgba(8,13,8,0.9); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.07); border-radius: 16px;
      overflow: hidden; opacity: 0; pointer-events: none;
      transition: opacity 0.4s, transform 0.4s;
      transform: translateY(-50%) translateX(-20px);
    }
    .photo-panel.visible {
      opacity: 1; pointer-events: auto;
      transform: translateY(-50%) translateX(0);
    }
    .photo-panel img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; }
    .photo-caption { padding: 10px 14px; font-size: 12px; color: #4A5A42; }
    .photo-close {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,0.5); border: none; color: #fff;
      width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
      font-size: 12px; display: flex; align-items: center; justify-content: center;
    }

    /* Controls */
    .controls {
      position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 16px;
      background: rgba(8,13,8,0.88); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.06); border-radius: 50px;
      padding: 12px 24px; white-space: nowrap;
    }
    .play-btn {
      width: 42px; height: 42px; background: #FC4C02; border: none;
      border-radius: 50%; color: #fff; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity 0.2s, transform 0.1s;
    }
    .play-btn:hover  { opacity: 0.88; }
    .play-btn:active { transform: scale(0.94); }

    .progress-wrap { display: flex; flex-direction: column; gap: 6px; width: 200px; }
    .progress-track {
      height: 4px; background: #1A2A18; border-radius: 2px; cursor: pointer;
    }
    .progress-fill { height: 100%; background: #FC4C02; border-radius: 2px; width: 0%; }
    .progress-times {
      display: flex; justify-content: space-between;
      font-size: 11px; color: #3A4A32;
    }

    .speed-btn {
      background: none; border: 1px solid #1E2E1A; color: #4A5A42;
      font-size: 12px; font-weight: 700; padding: 6px 12px;
      border-radius: 20px; cursor: pointer; flex-shrink: 0;
      transition: color 0.2s, border-color 0.2s;
    }
    .speed-btn:hover { color: #E0D8C8; border-color: #3A4A32; }

    /* Error toast */
    .toast {
      position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%);
      background: #2A0802; border: 1px solid #6A1A0A; color: #F08060;
      font-size: 14px; padding: 12px 24px; border-radius: 12px;
      opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- ── Connect ── -->
<div class="screen active" id="s-connect">
  <div class="connect-icon">⛰️</div>
  <h1 class="connect-title">Trail Replay</h1>
  <p class="connect-sub">Relive every moment on the trail.</p>
  <button class="connect-btn" onclick="connectStrava()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
      <path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/>
    </svg>
    Connect with Strava
  </button>
</div>

<!-- ── Activity input ── -->
<div class="screen" id="s-activity">
  <p class="welcome-line">welcome back</p>
  <p class="welcome-name" id="athlete-name">explorer</p>
  <input class="url-input" id="activity-url" type="text"
    placeholder="paste a strava activity link…"
    onkeydown="if(event.key==='Enter') loadActivity()"/>
  <button class="load-btn" onclick="loadActivity()">Load Activity →</button>

  <div id="google-connect-row" style="margin-top:20px; display:flex; align-items:center; gap:12px;">
    <button id="google-btn" onclick="connectGoogle()" style="
      display:flex; align-items:center; gap:8px;
      background:#1A1A1A; border:1px solid #2A3A22; color:#8A9A80;
      font-size:13px; padding:10px 18px; border-radius:20px; cursor:pointer;
      transition:border-color 0.2s, color 0.2s;">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      <span id="google-btn-label">connect google photos</span>
    </button>
    <span id="google-status" style="font-size:12px; color:#4A5A42; display:none;">✓ connected</span>
  </div>

  <button class="disconnect-btn" onclick="disconnect()">disconnect strava</button>
</div>

<!-- ── Loading ── -->
<div class="screen" id="s-loading">
  <div class="spinner"></div>
  <p class="loading-msg" id="loading-msg">fetching route…</p>
</div>

<!-- ── Map ── -->
<div class="screen" id="s-map">
  <div id="map"></div>
  <div id="map-loader" style="
    position:absolute; inset:0; background:#080D08;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
    z-index:10;">
    <div class="spinner"></div>
    <p class="loading-msg" id="map-loader-msg">fetching route…</p>
  </div>
  <div class="overlay">
    <div class="stats-card">
      <p class="activity-name" id="map-name">—</p>
      <div class="stats-row">
        <div class="stat">
          <span class="stat-val" id="stat-dist">—</span>
          <span class="stat-lbl">km</span>
        </div>
        <div class="stat">
          <span class="stat-val" id="stat-elev">—</span>
          <span class="stat-lbl">m elev</span>
        </div>
        <div class="stat">
          <span class="stat-val" id="stat-time">—</span>
          <span class="stat-lbl">time</span>
        </div>
      </div>
    </div>

    <button class="back-btn" onclick="backToActivity()">← new activity</button>

    <div class="photo-panel" id="photo-panel">
      <button class="photo-close" onclick="hidePhoto()">✕</button>
      <img id="photo-img" src="" alt=""/>
      <p class="photo-caption" id="photo-caption"></p>
    </div>

    <div class="controls">
      <button class="play-btn" id="play-btn" onclick="togglePlay()">▶</button>
      <div class="progress-wrap">
        <div class="progress-track" onclick="seekTo(event)">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-times">
          <span id="time-elapsed">0:00</span>
          <span id="time-total">0:00</span>
        </div>
      </div>
      <button class="speed-btn" id="speed-btn" onclick="cycleSpeed()">1×</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Config ────────────────────────────────────────────────────────────────
const CLIENT_ID   = '209667';
const MAPTILER    = '2OnFMSLUHqJZ20hkM0IB';
const REDIRECT    = window.location.origin + '/api/exchange';
const AUTH_URL    = `https://www.strava.com/oauth/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT)}&response_type=code&scope=activity:read_all`;

const GOOGLE_CLIENT_ID  = '649464508000-57j4fhkgou7mh4ov807g0h5cin3m8va4.apps.googleusercontent.com';
const GOOGLE_REDIRECT   = 'https://trailreplay.vercel.app/api/google-auth';
const GOOGLE_SCOPE      = 'https://www.googleapis.com/auth/photoslibrary.readonly';
const GOOGLE_AUTH_URL   = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${GOOGLE_CLIENT_ID}&redirect_uri=${encodeURIComponent(GOOGLE_REDIRECT)}&response_type=code&scope=${encodeURIComponent(GOOGLE_SCOPE)}&access_type=offline&prompt=consent`;

// ── State ─────────────────────────────────────────────────────────────────
let accessToken  = localStorage.getItem('strava_access')  || null;
let refreshToken = localStorage.getItem('strava_refresh') || null;
let expiresAt    = parseInt(localStorage.getItem('strava_expires') || '0');
let athleteName  = localStorage.getItem('strava_name')   || '';

let googleToken   = localStorage.getItem('google_access')   || null;
let googleRefresh = localStorage.getItem('google_refresh')  || null;
let googleExpires = parseInt(localStorage.getItem('google_expires') || '0');

let activityStartDate = null;   // ISO string, set when activity loads

let map           = null;
let routeCoords   = [];   // [[lat,lng], ...]
let routeTimes    = [];   // [seconds, ...]
let photos        = [];   // [{lat,lng,url,caption}, ...]
let totalDuration = 0;

let isPlaying      = false;
let currentStep    = 0;
let playbackSpeed  = 1;
let animTimer      = null;
let activePhoto    = -1;
let photoTimeout   = null;

const SPEEDS  = [1, 2, 4, 8];
const TICK_MS = 100;

// Per-activity camera + sampling config
const ACTIVITY_CONFIG = {
  run:   { zoom: 17.0, pitch: 60, lookAhead: 25, maxPts: 600, label: 'Run'       },
  hike:  { zoom: 16.5, pitch: 65, lookAhead: 20, maxPts: 800, label: 'Hike'      },
  ride:  { zoom: 16.0, pitch: 65, lookAhead: 40, maxPts: 600, label: 'Ride'      },
  ski:   { zoom: 15.5, pitch: 70, lookAhead: 50, maxPts: 400, label: 'Ski/Board' },
  default:{ zoom: 16.0, pitch: 65, lookAhead: 30, maxPts: 700, label: ''         }
};

function activityConfig(stravaType) {
  const t = (stravaType || '').toLowerCase();
  if (['run','trailrun','virtualrun'].includes(t))                         return ACTIVITY_CONFIG.run;
  if (['hike','walk','snowshoe','backcountryski','nordicski'].includes(t)) return ACTIVITY_CONFIG.hike;
  if (['ride','virtualride','mountainbikeride','gravelride','ebikeride'].includes(t)) return ACTIVITY_CONFIG.ride;
  if (['alpineski','snowboard'].includes(t))                               return ACTIVITY_CONFIG.ski;
  return ACTIVITY_CONFIG.default;
}

let camCfg = ACTIVITY_CONFIG.default;

// ── Boot ──────────────────────────────────────────────────────────────────
(function boot() {
  const p = new URLSearchParams(window.location.search);
  if (p.get('access_token')) {
    saveTokens(p.get('access_token'), p.get('refresh_token'),
               parseInt(p.get('expires_at')), p.get('athlete_name') || '');
    history.replaceState({}, '', '/');
  }
  if (p.get('google_access_token')) {
    saveGoogleTokens(p.get('google_access_token'), p.get('google_refresh_token'),
                     Math.floor(Date.now() / 1000) + parseInt(p.get('google_expires_in') || '3600'));
    history.replaceState({}, '', '/');
  }
  accessToken ? showActivityScreen() : goTo('s-connect');
})();

// ── Auth ──────────────────────────────────────────────────────────────────
function connectStrava() { window.location.href = AUTH_URL; }

function saveTokens(access, refresh, expires, name) {
  accessToken = access; refreshToken = refresh;
  expiresAt = expires;  athleteName  = name;
  localStorage.setItem('strava_access',  access);
  localStorage.setItem('strava_refresh', refresh);
  localStorage.setItem('strava_expires', expires);
  localStorage.setItem('strava_name',    name);
}

function disconnect() {
  localStorage.clear();
  accessToken = null;
  goTo('s-connect');
}

async function ensureToken() {
  if (Date.now() / 1000 < expiresAt - 60) return;
  try {
    const r    = await fetch('/api/refresh', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh_token: refreshToken })
    });
    const data = await r.json();
    saveTokens(data.access_token, data.refresh_token, data.expires_at, athleteName);
  } catch {
    showToast('Session expired — please reconnect.');
    disconnect();
    throw new Error('Token refresh failed');
  }
}

// ── Google Auth ───────────────────────────────────────────────────────────
function connectGoogle() { window.location.href = GOOGLE_AUTH_URL; }

function saveGoogleTokens(access, refresh, expires) {
  googleToken   = access;
  googleExpires = expires;
  if (refresh) { googleRefresh = refresh; localStorage.setItem('google_refresh', refresh); }
  localStorage.setItem('google_access',  access);
  localStorage.setItem('google_expires', expires);
  updateGoogleUI();
}

function updateGoogleUI() {
  const connected = !!googleToken;
  document.getElementById('google-btn-label').textContent = connected ? 'google photos connected' : 'connect google photos';
  document.getElementById('google-status').style.display  = connected ? 'inline' : 'none';
  if (connected) document.getElementById('google-btn').style.borderColor = '#3A6A32';
}

async function ensureGoogleToken() {
  if (!googleToken) return false;
  if (Date.now() / 1000 < googleExpires - 60) return true;
  if (!googleRefresh) { googleToken = null; updateGoogleUI(); return false; }
  try {
    const r    = await fetch('/api/google-refresh', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh_token: googleRefresh })
    });
    const data = await r.json();
    if (!data.access_token) throw new Error();
    saveGoogleTokens(data.access_token, null, Math.floor(Date.now() / 1000) + (data.expires_in || 3600));
    return true;
  } catch {
    googleToken = null; updateGoogleUI(); return false;
  }
}

// ── Google Photos ─────────────────────────────────────────────────────────
async function loadGooglePhotos(startDate, durationSecs) {
  const ok = await ensureGoogleToken();
  if (!ok) return [];

  try {
    const startMs = new Date(startDate).getTime();
    const endMs   = startMs + durationSecs * 1000;

    // Collect each unique calendar day the activity spans (UTC)
    const dates = [];
    let d = new Date(startMs);
    while (d.getTime() <= endMs + 86400000) {
      dates.push({ year: d.getUTCFullYear(), month: d.getUTCMonth() + 1, day: d.getUTCDate() });
      d = new Date(d.getTime() + 86400000);
      if (dates.length > 3) break; // cap at 3 days
    }

    const r = await fetch('/api/google-photos', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ access_token: googleToken, dates })
    });
    if (!r.ok) return [];

    const data  = await r.json();
    const items = data.mediaItems || [];

    return items
      .filter(item => item.mediaMetadata?.creationTime)
      .map(item => {
        const photoMs   = new Date(item.mediaMetadata.creationTime).getTime();
        const offsetSec = (photoMs - startMs) / 1000;
        if (offsetSec < -120 || offsetSec > durationSecs + 120) return null;

        // Match to nearest route point by time offset
        let bestIdx = 0, bestDiff = Infinity;
        for (let i = 0; i < routeTimes.length; i++) {
          const diff = Math.abs(routeTimes[i] - offsetSec);
          if (diff < bestDiff) { bestDiff = diff; bestIdx = i; }
        }

        const coord = routeCoords[bestIdx];
        return {
          lat:     coord[0],
          lng:     coord[1],
          url:     item.baseUrl + '=w2000-h2000',
          caption: item.filename || fmt(Math.max(0, Math.floor(offsetSec))),
          source:  'google'
        };
      })
      .filter(Boolean);

  } catch (e) {
    console.warn('Google Photos load failed:', e);
    return [];
  }
}

// ── Strava API ────────────────────────────────────────────────────────────
async function api(path) {
  await ensureToken();
  const r = await fetch('https://www.strava.com/api/v3' + path, {
    headers: { Authorization: 'Bearer ' + accessToken }
  });
  if (!r.ok) {
    const body = await r.json().catch(() => ({}));
    throw new Error(`Strava API ${r.status}: ${body.message || path}`);
  }
  return r.json();
}

function extractId(url) {
  const m = url.match(/activities\/(\d+)/);
  return m ? m[1] : null;
}

// ── Load activity ─────────────────────────────────────────────────────────
async function loadActivity() {
  const raw = document.getElementById('activity-url').value.trim();
  const id  = extractId(raw);
  if (!id) { showToast('Paste a valid Strava activity URL.'); return; }

  // Show map screen immediately so map starts initialising in parallel with API calls
  goTo('s-map');
  setLoaderMsg('fetching route…');

  try {
    const [[activity, streams, photoData]] = await Promise.all([
      Promise.all([
        api(`/activities/${id}`),
        api(`/activities/${id}/streams?keys=latlng,time,altitude&key_by_type=true`),
        api(`/activities/${id}/photos?size=2000`).catch(() => [])
      ]),
      buildMap()
    ]);

    if (!streams.latlng) throw new Error('No GPS data found for this activity.');

    // Pick camera config based on activity type
    camCfg = activityConfig(activity.type);

    // Downsample dense GPS tracks based on activity type
    const raw      = streams.latlng.data;
    const rawTimes = streams.time ? streams.time.data : raw.map((_, i) => i);
    const step     = Math.max(1, Math.floor(raw.length / camCfg.maxPts));
    routeCoords   = raw.filter((_, i) => i % step === 0 || i === raw.length - 1);
    routeTimes    = rawTimes.filter((_, i) => i % step === 0 || i === rawTimes.length - 1);
    totalDuration = routeTimes[routeTimes.length - 1];
    computeSmoothedBearings();

    const stravaPhotos = (photoData || [])
      .filter(p => p.location && p.location[0] && p.urls)
      .map(p => ({
        lat:     p.location[0],
        lng:     p.location[1],
        url:     p.urls['2000'] || Object.values(p.urls)[0],
        caption: p.caption || '',
        source:  'strava'
      }));

    const googlePhotos = await loadGooglePhotos(activity.start_date, activity.elapsed_time);
    photos = [...stravaPhotos, ...googlePhotos];

    document.getElementById('map-name').textContent   = activity.name;
    document.getElementById('stat-dist').textContent  = (activity.distance / 1000).toFixed(1);
    document.getElementById('stat-elev').textContent  = Math.round(activity.total_elevation_gain);
    document.getElementById('stat-time').textContent  = fmt(activity.moving_time);
    document.getElementById('time-total').textContent = fmt(totalDuration);

    addRoute();
    addPhotoMarkers();

    // Fly to route start with correct pitch — fitBounds resets pitch to 0 so we do it manually
    const lngs   = routeCoords.map(c => c[1]);
    const lats   = routeCoords.map(c => c[0]);
    const cLng   = (Math.min(...lngs) + Math.max(...lngs)) / 2;
    const cLat   = (Math.min(...lats) + Math.max(...lats)) / 2;
    const spanLng = Math.max(...lngs) - Math.min(...lngs);
    const spanLat = Math.max(...lats) - Math.min(...lats);
    const zoom   = Math.min(14, Math.floor(Math.log2(360 / Math.max(spanLng, spanLat * 1.4))) + 1);

    map.easeTo({ center: [cLng, cLat], zoom, pitch: camCfg.pitch, bearing: 0, duration: 1200 });

    hideLoader();
    currentStep = 0;
    setTimeout(startPlay, 1400);

  } catch (e) {
    showToast(e.message || 'Failed to load activity.');
    goTo('s-activity');
  }
}

// ── Map ───────────────────────────────────────────────────────────────────
function buildMap() {
  return new Promise(resolve => {
    if (map) { map.remove(); map = null; }

    // Give the browser one frame to paint the container before MapLibre reads its dimensions
    requestAnimationFrame(() => {

    map = new maplibregl.Map({
      container: 'map',
      style:     `https://api.maptiler.com/maps/outdoor-v2/style.json?key=${MAPTILER}`,
      center:    [0, 20],
      zoom:      2, pitch: 0, bearing: 0,
      antialias: true
    });

    map.on('style.load', () => {
      map.addSource('terrain', {
        type: 'raster-dem',
        url:  `https://api.maptiler.com/tiles/terrain-rgb-v2/tiles.json?key=${MAPTILER}`,
        tileSize: 256
      });
      map.setTerrain({ source: 'terrain', exaggeration: 2.0 });
      map.setPitch(camCfg.pitch);
      map.resize();
      resolve();
    });

    }); // end requestAnimationFrame
  });
}

function addRoute() {
  const geojson = {
    type: 'Feature',
    geometry: { type: 'LineString', coordinates: routeCoords.map(([a, b]) => [b, a]) }
  };
  map.addSource('route', { type: 'geojson', data: geojson });
  map.addLayer({ id: 'route-glow', type: 'line', source: 'route',
    paint: { 'line-color': '#FC4C02', 'line-width': 10, 'line-opacity': 0.2, 'line-blur': 6 }
  });
  map.addLayer({ id: 'route-line', type: 'line', source: 'route',
    paint: { 'line-color': '#FC4C02', 'line-width': 3, 'line-opacity': 0.9 }
  });
}

function addPhotoMarkers() {
  photos.forEach((photo, i) => {
    const el = document.createElement('div');
    el.style.cssText = `
      width:38px; height:38px; border-radius:50%;
      background: url(${photo.url}) center/cover;
      border: 2.5px solid #FC4C02;
      box-shadow: 0 0 14px rgba(252,76,2,0.45);
      cursor: pointer; flex-shrink: 0;
    `;
    el.addEventListener('click', () => showPhoto(i));
    new maplibregl.Marker({ element: el }).setLngLat([photo.lng, photo.lat]).addTo(map);
  });
}

// ── Playback ──────────────────────────────────────────────────────────────
function startPlay() {
  if (currentStep >= routeCoords.length - 1) currentStep = 0;
  isPlaying = true;
  document.getElementById('play-btn').textContent = '⏸';
  tick();
}

function pause() {
  isPlaying = false;
  clearTimeout(animTimer);
  document.getElementById('play-btn').textContent = '▶';
}

function togglePlay() { isPlaying ? pause() : startPlay(); }

function tick() {
  if (!isPlaying) return;
  if (currentStep >= routeCoords.length - 1) { pause(); return; }

  moveCamera(currentStep);
  updateProgress();
  checkPhotos();

  currentStep = Math.min(currentStep + Math.max(1, playbackSpeed), routeCoords.length - 1);
  animTimer = setTimeout(tick, TICK_MS);
}

let smoothedBearings = [];

// Pre-compute a fully smoothed bearing for every route point.
// Called once after routeCoords is built, before playback starts.
function computeSmoothedBearings() {
  const n = routeCoords.length;

  // Step 1: raw lookahead bearings
  const raw = routeCoords.map((_, i) => {
    const j = Math.min(i + camCfg.lookAhead, n - 1);
    return bearing(routeCoords[i], routeCoords[j]);
  });

  // Step 2: run 5 forward EMA passes with a gentle alpha (0.08)
  let arr = raw.slice();
  for (let pass = 0; pass < 5; pass++) {
    const smooth = [arr[0]];
    for (let i = 1; i < n; i++) {
      let diff = arr[i] - smooth[i - 1];
      if (diff >  180) diff -= 360;
      if (diff < -180) diff += 360;
      smooth.push((smooth[i - 1] + diff * 0.08 + 360) % 360);
    }
    arr = smooth;
  }

  smoothedBearings = arr;
}

function moveCamera(i) {
  const pos = routeCoords[i];
  map.easeTo({
    center:   [pos[1], pos[0]],
    bearing:  smoothedBearings[i] ?? 0,
    pitch:    camCfg.pitch,
    zoom:     camCfg.zoom,
    duration: 200,
    easing:   t => t
  });
}

function bearing([lat1, lng1], [lat2, lng2]) {
  const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
  const Δλ = (lng2 - lng1) * Math.PI / 180;
  const y  = Math.sin(Δλ) * Math.cos(φ2);
  const x  = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function updateProgress() {
  const pct = currentStep / (routeCoords.length - 1);
  document.getElementById('progress-fill').style.width = (pct * 100) + '%';
  document.getElementById('time-elapsed').textContent  = fmt(routeTimes[currentStep] || 0);
}

function seekTo(e) {
  const pct = e.offsetX / e.currentTarget.offsetWidth;
  currentStep = Math.floor(pct * (routeCoords.length - 1));
  moveCamera(currentStep);
  updateProgress();
}

function cycleSpeed() {
  playbackSpeed = SPEEDS[(SPEEDS.indexOf(playbackSpeed) + 1) % SPEEDS.length];
  document.getElementById('speed-btn').textContent = playbackSpeed + '×';
}

// ── Photos ────────────────────────────────────────────────────────────────
function checkPhotos() {
  if (!photos.length) return;
  const cam = routeCoords[currentStep];
  photos.forEach((p, i) => {
    if (i !== activePhoto && dist(cam[0], cam[1], p.lat, p.lng) < 80) showPhoto(i);
  });
}

function showPhoto(i) {
  const p = photos[i];
  activePhoto = i;
  document.getElementById('photo-img').src           = p.url;
  document.getElementById('photo-caption').textContent = p.caption || fmt(routeTimes[currentStep] || 0);
  document.getElementById('photo-panel').classList.add('visible');
  clearTimeout(photoTimeout);
  photoTimeout = setTimeout(hidePhoto, 6000);
}

function hidePhoto() {
  document.getElementById('photo-panel').classList.remove('visible');
  activePhoto = -1;
}

function dist(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
  const Δφ = (lat2 - lat1) * Math.PI / 180, Δλ = (lng2 - lng1) * Math.PI / 180;
  const a  = Math.sin(Δφ/2)**2 + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// ── Helpers ───────────────────────────────────────────────────────────────
function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showActivityScreen() {
  document.getElementById('athlete-name').textContent = athleteName || 'explorer';
  updateGoogleUI();
  goTo('s-activity');
}

function backToActivity() {
  pause(); hidePhoto();
  goTo('s-activity');
}

function setLoaderMsg(t) { document.getElementById('map-loader-msg').textContent = t; }
function hideLoader() { document.getElementById('map-loader').style.display = 'none'; }

function fmt(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = Math.floor(secs % 60);
  return h > 0
    ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
    : `${m}:${String(s).padStart(2,'0')}`;
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 4000);
}
</script>
